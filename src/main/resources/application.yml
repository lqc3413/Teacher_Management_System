server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/teacher_mgmt?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    # 开启驼峰命名自动映射（employee_no -> employeeNo）
    map-underscore-to-camel-case: true
    # 控制台打印 SQL（开发环境方便调试）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto
      # 逻辑删除字段值
      logic-delete-value: 0
      logic-not-delete-value: 1
